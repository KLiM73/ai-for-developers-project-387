[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:rails]
command=/rails/bin/rails server -b 127.0.0.1 -p 3000
directory=/rails
environment=RAILS_ENV="production",BUNDLE_PATH="/usr/local/bundle",LD_PRELOAD="/usr/local/lib/libjemalloc.so",PORT="3000"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
